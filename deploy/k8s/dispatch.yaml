# Beta reference deployment: one control plane service plus horizontally
# scaled worker (consumer) pods. Workers compete on the deployment's queue
# over HTTP, so scaling execution is `kubectl scale deployment/dispatch-worker`
# (or an HPA) — the control plane doesn't change.
#
# NOTE (beta): each pod's workspace is an emptyDir, i.e. NOT shared across
# pods. Production deployments must point --workspace at a shared backend
# (a network mount today; GCS/S3 backends are on the roadmap).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-server
  labels:
    app.kubernetes.io/name: dispatch
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatch
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatch
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: dispatch
          image: dispatch:dev
          imagePullPolicy: Never # minikube: image built into the cluster's docker
          args: ["serve", "--addr", ":8484", "--workspace", "/workspace"]
          ports:
            - containerPort: 8484
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8484
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch
  labels:
    app.kubernetes.io/name: dispatch
spec:
  selector:
    app.kubernetes.io/name: dispatch
    app.kubernetes.io/component: server
  ports:
    - port: 8484
      targetPort: 8484
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-worker
  labels:
    app.kubernetes.io/name: dispatch
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatch
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatch
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: dispatch:dev
          imagePullPolicy: Never
          args:
            - work
            - --server=http://dispatch:8484
            - --deployment=echo-service
            - --concurrency=2
            - --workspace=/workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
